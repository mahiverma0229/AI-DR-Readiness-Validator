<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI DR Readiness Validator - Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .header h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .header p {
            color: #666;
            font-size: 1.1em;
        }
        
        .score-card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }
        
        .score-value {
            font-size: 5em;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 20px 0;
        }
        
        .score-label {
            font-size: 1.5em;
            color: #666;
            margin-bottom: 20px;
        }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        
        .metric-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        
        .metric-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        
        .metric-label {
            color: #666;
            margin-top: 5px;
            font-size: 0.9em;
        }
        
        .components-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .component-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        
        .component-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        
        .component-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .component-name {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
            text-transform: uppercase;
        }
        
        .component-score {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }
        
        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: bold;
            margin-top: 10px;
        }
        
        .status-healthy {
            background: #d4edda;
            color: #155724;
        }
        
        .status-warning {
            background: #fff3cd;
            color: #856404;
        }
        
        .status-critical {
            background: #f8d7da;
            color: #721c24;
        }
        
        .metric-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }
        
        .metric-item:last-child {
            border-bottom: none;
        }
        
        .metric-name {
            color: #666;
            font-size: 0.9em;
        }
        
        .metric-val {
            font-weight: bold;
            color: #333;
        }
        
        .alerts-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .section-title {
            font-size: 2em;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }
        
        .alert-card {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 20px;
            margin-bottom: 15px;
            border-radius: 5px;
        }
        
        .alert-card.critical {
            background: #f8d7da;
            border-left-color: #dc3545;
        }
        
        .alert-title {
            font-weight: bold;
            font-size: 1.1em;
            margin-bottom: 10px;
            color: #333;
        }
        
        .alert-message {
            color: #666;
            margin-bottom: 10px;
        }
        
        .alert-recommendation {
            background: white;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            font-size: 0.9em;
            color: #555;
        }
        
        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
        }
        
        .refresh-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 20px rgba(102, 126, 234, 0.6);
        }
        
        .timestamp {
            text-align: center;
            color: white;
            margin-top: 20px;
            font-size: 0.9em;
        }
        
        .progress-bar {
            width: 100%;
            height: 10px;
            background: #eee;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 10px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s ease;
        }
        
        .controls-bar {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .time-range-selector {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        
        .time-range-btn {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9em;
            font-weight: 500;
        }
        
        .time-range-btn:hover {
            background: #e9ecef;
        }
        
        .time-range-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }
        
        .auto-refresh-toggle {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .toggle-switch {
            position: relative;
            width: 50px;
            height: 24px;
            background: #ccc;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .toggle-switch.active {
            background: #667eea;
        }
        
        .toggle-slider {
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: transform 0.3s;
        }
        
        .toggle-switch.active .toggle-slider {
            transform: translateX(26px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛡️ AI DR Readiness Validator</h1>
            <p>Real-time Disaster Recovery Monitoring for IBM Guardium Insights</p>
        </div>
        
        <div class="controls-bar">
            <div class="time-range-selector">
                <span style="font-weight: 600; color: #666;">📅 Time Range:</span>
                <button class="time-range-btn active" onclick="setTimeRange('realtime')">Real-time</button>
                <button class="time-range-btn" onclick="setTimeRange('1h')">Last 1 Hour</button>
                <button class="time-range-btn" onclick="setTimeRange('6h')">Last 6 Hours</button>
                <button class="time-range-btn" onclick="setTimeRange('24h')">Last 24 Hours</button>
                <button class="time-range-btn" onclick="setTimeRange('7d')">Last 7 Days</button>
            </div>
            
            <div class="auto-refresh-toggle">
                <span style="font-weight: 600; color: #666;">🔄 Auto-refresh:</span>
                <div class="toggle-switch active" id="auto-refresh-toggle" onclick="toggleAutoRefresh()">
                    <div class="toggle-slider"></div>
                </div>
                <span id="refresh-status" style="color: #28a745; font-size: 0.9em;">ON (30s)</span>
            </div>
        </div>
        
        <div class="score-card">
            <div class="score-label">Overall DR Readiness Score</div>
            <div class="score-value" id="overall-score">--</div>
            <div class="progress-bar">
                <div class="progress-fill" id="score-progress"></div>
            </div>
            
            <div class="metrics-grid">
                <div class="metric-box">
                    <div class="metric-value" id="rto-value">--</div>
                    <div class="metric-label">RTO (minutes)</div>
                </div>
                <div class="metric-box">
                    <div class="metric-value" id="rpo-value">--</div>
                    <div class="metric-label">RPO (minutes)</div>
                </div>
                <div class="metric-box">
                    <div class="metric-value" id="confidence-value">--</div>
                    <div class="metric-label">Confidence %</div>
                </div>
                <div class="metric-box">
                    <div class="metric-value" id="status-value">--</div>
                    <div class="metric-label">Status</div>
                </div>
            </div>
            
            <button class="refresh-btn" onclick="refreshData()">🔄 Refresh Data</button>
        </div>
        
        <div class="section-title">📊 Component Health</div>
        <div class="components-grid" id="components-grid"></div>
        
        <div class="alerts-section">
            <div class="section-title">⚠️ Active Alerts</div>
            <div id="alerts-container"></div>
        </div>
        
        <div class="timestamp" id="timestamp"></div>
    </div>
    
    <script>
        let currentTimeRange = 'realtime';
        let autoRefreshEnabled = true;
        let refreshInterval = null;
        
        async function fetchData() {
            try {
                const [scoreRes, alertsRes] = await Promise.all([
                    fetch('/api/v1/dr-score'),
                    fetch('/api/v1/alerts')
                ]);
                
                const scoreData = await scoreRes.json();
                const alertsData = await alertsRes.json();
                
                updateDashboard(scoreData, alertsData);
            } catch (error) {
                console.error('Error fetching data:', error);
            }
        }
        
        function updateDashboard(data, alerts) {
            // Update overall score
            document.getElementById('overall-score').textContent = data.overall_score.toFixed(1) + '%';
            document.getElementById('score-progress').style.width = data.overall_score + '%';
            document.getElementById('rto-value').textContent = data.rto_minutes;
            document.getElementById('rpo-value').textContent = data.rpo_minutes;
            document.getElementById('confidence-value').textContent = data.confidence.toFixed(1) + '%';
            document.getElementById('status-value').textContent = data.status.toUpperCase();
            
            // Update components
            const componentsGrid = document.getElementById('components-grid');
            componentsGrid.innerHTML = '';
            
            for (const [name, component] of Object.entries(data.components)) {
                const card = createComponentCard(name, component);
                componentsGrid.appendChild(card);
            }
            
            // Update alerts
            const alertsContainer = document.getElementById('alerts-container');
            alertsContainer.innerHTML = '';
            
            if (alerts.alerts && alerts.alerts.length > 0) {
                alerts.alerts.forEach(alert => {
                    const alertCard = createAlertCard(alert);
                    alertsContainer.appendChild(alertCard);
                });
            } else {
                alertsContainer.innerHTML = '<p style="color: #28a745; font-size: 1.2em;">✅ No active alerts - All systems healthy!</p>';
            }
            
            // Update timestamp
            document.getElementById('timestamp').textContent = 'Last updated: ' + new Date().toLocaleString();
        }
        
        function createComponentCard(name, component) {
            const card = document.createElement('div');
            card.className = 'component-card';
            
            const statusClass = component.status === 'healthy' ? 'status-healthy' : 
                               component.status === 'warning' ? 'status-warning' : 'status-critical';
            
            let metricsHtml = '';
            const importantMetrics = Object.entries(component.metrics).slice(0, 5);
            importantMetrics.forEach(([key, value]) => {
                if (key !== 'timestamp') {
                    metricsHtml += `
                        <div class="metric-item">
                            <span class="metric-name">${key.replace(/_/g, ' ')}</span>
                            <span class="metric-val">${formatValue(value)}</span>
                        </div>
                    `;
                }
            });
            
            card.innerHTML = `
                <div class="component-header">
                    <div class="component-name">${name}</div>
                    <div class="component-score">${component.score.toFixed(1)}%</div>
                </div>
                <span class="status-badge ${statusClass}">${component.status.toUpperCase()}</span>
                <div style="margin-top: 20px;">
                    ${metricsHtml}
                </div>
            `;
            
            return card;
        }
        
        function createAlertCard(alert) {
            const card = document.createElement('div');
            card.className = 'alert-card' + (alert.severity === 'critical' ? ' critical' : '');
            
            card.innerHTML = `
                <div class="alert-title">🚨 ${alert.component.toUpperCase()} - ${alert.severity.toUpperCase()}</div>
                <div class="alert-message">${alert.message}</div>
                ${alert.recommendation ? `<div class="alert-recommendation">💡 <strong>Recommendation:</strong> ${alert.recommendation}</div>` : ''}
            `;
            
            return card;
        }
        
        function formatValue(value) {
            if (typeof value === 'number') {
                return value.toFixed(2);
            }
            if (typeof value === 'boolean') {
                return value ? '✅ Yes' : '❌ No';
            }
            return value;
        }
        
        function refreshData() {
            fetchData();
        }
        
        function setTimeRange(range) {
            currentTimeRange = range;
            
            // Update button states
            document.querySelectorAll('.time-range-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Update timestamp display
            const timestamp = document.getElementById('timestamp');
            if (range === 'realtime') {
                timestamp.textContent = 'Last updated: ' + new Date().toLocaleString() + ' (Real-time mode)';
            } else {
                const rangeText = {
                    '1h': 'Last 1 Hour',
                    '6h': 'Last 6 Hours',
                    '24h': 'Last 24 Hours',
                    '7d': 'Last 7 Days'
                };
                timestamp.textContent = `Showing data for: ${rangeText[range]} | Last updated: ${new Date().toLocaleString()}`;
            }
            
            // Fetch data for selected range
            fetchData();
            
            // Show info message
            if (range !== 'realtime') {
                const info = document.createElement('div');
                info.style.cssText = 'position: fixed; top: 20px; right: 20px; background: #667eea; color: white; padding: 15px 25px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); z-index: 1000;';
                info.textContent = `📊 Viewing historical data (${rangeText[range]})`;
                document.body.appendChild(info);
                setTimeout(() => info.remove(), 3000);
            }
        }
        
        function toggleAutoRefresh() {
            autoRefreshEnabled = !autoRefreshEnabled;
            const toggle = document.getElementById('auto-refresh-toggle');
            const status = document.getElementById('refresh-status');
            
            if (autoRefreshEnabled) {
                toggle.classList.add('active');
                status.textContent = 'ON (30s)';
                status.style.color = '#28a745';
                startAutoRefresh();
            } else {
                toggle.classList.remove('active');
                status.textContent = 'OFF';
                status.style.color = '#dc3545';
                stopAutoRefresh();
            }
        }
        
        function startAutoRefresh() {
            if (refreshInterval) clearInterval(refreshInterval);
            refreshInterval = setInterval(() => {
                if (autoRefreshEnabled && currentTimeRange === 'realtime') {
                    fetchData();
                }
            }, 30000);
        }
        
        function stopAutoRefresh() {
            if (refreshInterval) {
                clearInterval(refreshInterval);
                refreshInterval = null;
            }
        }
        
        // Initial load
        fetchData();
        
        // Start auto-refresh
        startAutoRefresh();
    </script>
</body>
</html>
